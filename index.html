<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Компания - Главная</title>
    <style>
        body { font-family: Arial, sans-serif; margin: 0; padding: 0; }
        header, footer { background: #333; color: white; padding: 20px; text-align: center; }
        .contact-section { padding: 40px; background: #f4f4f4; text-align: center; }
        .btn { display: inline-block; padding: 15px 30px; background: #007bff; color: white; text-decoration: none; border-radius: 5px; margin: 10px; }
        .social-links a { margin: 0 10px; color: white; }
    </style>
</head>
<body>
    <header>
        <h1>Добро пожаловать на сайт компании</h1>
    </header>

    <main>
        <!-- Основной контент -->
        <section>
            <h2>О нас</h2>
            <p>Информация о компании...</p>
        </section>
    </main>

    <!-- Блок Связаться с нами -->
    <section id="contact" class="contact-section">
        <h2>Связаться с нами</h2>
        <p>Для связи используйте официальные каналы.</p>
        
        <a href="https://company-site.ru" class="btn" target="_blank">
            ОФИЦИАЛЬНЫЙ САЙТ КОМПАНИИ
        </a>
        
        <div class="social-links">
            <!-- Соцсети без Instagram -->
            <a href="https://t.me/company" target="_blank">Telegram</a>
            <a href="https://vk.com/company" target="_blank">VK</a>
        </div>
    </section>

    <footer>
        <p>&copy; 2026 Компания. Все права защищены.</p>
    </footer>
</body>
</html>
